<title>Logic Games</title>
<style>
/* ============================================================
   LOGIC GAMES — styles
   Dieter Rams / Braun aesthetic: warm off-white, soft near-black,
   one muted accent, thin quiet lines, no ornament of any kind.
   ============================================================ */
:root {
  --bg: #F5F3EF;        /* warm off-white background */
  --ink: #262420;       /* softened near-black */
  --ink-soft: #57524A;  /* secondary text, user entries */
  --faint: #8F897E;     /* quiet notes, pencil marks */
  --line: #CFCAC0;      /* thin grid lines and borders */
  --accent: #7A6A4F;    /* single muted accent — active/selected only */
  --cell: #ECE8E0;      /* unrevealed / recessed surfaces */
}

* { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  font-size: 17px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  touch-action: manipulation;
  overscroll-behavior: none;
  -webkit-user-select: none; user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

button {
  font: inherit;
  color: var(--ink);
  background: transparent;
  border: 1px solid var(--line);
  padding: .5em 1.15em;
  min-height: 48px;
  min-width: 48px;
  cursor: pointer;
}
button.active { border-color: var(--accent); color: var(--accent); }
button.linklike {
  border: none; min-height: 44px; color: var(--faint);
  font-size: .85em; text-decoration: underline; text-underline-offset: 3px;
  padding-left: 0;
}

.view {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  padding: calc(env(safe-area-inset-top) + 18px)
           calc(env(safe-area-inset-right) + 28px)
           calc(env(safe-area-inset-bottom) + 18px)
           calc(env(safe-area-inset-left) + 28px);
}
.hidden { display: none !important; }

/* ---------------- home screen ---------------- */
.home-head { padding: 14px 0 6px; }
.home-head h1 { font-size: 2.1em; font-weight: 600; letter-spacing: .01em; }
.home-head .sub { color: var(--faint); }
#game-list { flex: 1; overflow-y: auto; margin-top: 10px; }
.game-row {
  display: flex; flex-wrap: wrap; align-items: center; gap: 16px;
  padding: 20px 0;
  border-top: 1px solid var(--line);
}
.game-row:last-child { border-bottom: 1px solid var(--line); }
.game-name { font-size: 1.35em; font-weight: 500; flex: 1 0 220px; }
.diff-btns { display: flex; gap: 12px; }
.notice { flex-basis: 100%; font-size: .8em; color: var(--faint); margin-top: -8px; }
.home-foot { padding-top: 16px; }

/* ---------------- game chrome ---------------- */
#game-head {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}
#game-title { font-size: 1.25em; font-weight: 600; flex: 1; min-width: 160px; }
.head-actions { display: flex; gap: 12px; }
#game-root {
  flex: 1; min-height: 0; position: relative;
  display: flex; flex-direction: column;
  padding-top: 14px;
}

/* shared toolbar inside a game */
.bar { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; padding-bottom: 10px; }
.bar .status { flex: 1; min-width: 180px; color: var(--ink-soft); }
.seg { display: flex; }
.seg button { border-right-width: 0; }
.seg button:last-child { border-right-width: 1px; }
.small { font-size: .85em; color: var(--faint); }

/* ---------------- how-to overlay ---------------- */
#overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(245, 243, 239, .97);
  display: flex; align-items: center; justify-content: center;
  padding: 32px;
}
#overlay-box {
  max-width: 620px; max-height: 100%; overflow-y: auto;
  border: 1px solid var(--ink);
  background: var(--bg);
  padding: 36px 40px;
}
#overlay-box h2 { font-size: 1.3em; font-weight: 600; margin-bottom: 14px; }
#overlay-box p { margin-bottom: 12px; }
.overlay-dismiss { color: var(--faint); font-size: .85em; margin-top: 18px; }

/* ---------------- portrait lock ----------------
   The app is designed for portrait only. In landscape everything
   is hidden behind a quiet full-screen note asking to rotate. */
#rotate-note { display: none; }
@media (orientation: landscape) {
  #view-home, #view-game, #overlay { display: none !important; }
  #rotate-note {
    display: flex;
    position: fixed; inset: 0;
    align-items: center; justify-content: center;
    color: var(--ink-soft);
    font-size: 1.2em;
    text-align: center;
    padding: 40px;
  }
}

/* shared SVG symbol classes (Set + Facade) */
.sym { stroke: var(--ink); }
.fl0 { fill: none; }
.fl1 { fill: var(--ink-soft); }
.fl2 { fill: url(#patHatch); }
.st0 { stroke-width: 2.5; }
.st1 { stroke-width: 6; }
.st2 { stroke-width: 2.5; stroke-dasharray: 8 5; }

/* ============================================================
   MINESWEEPER
   ============================================================ */
.ms-wrap { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
.ms-grid {
  display: grid; gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  grid-template-columns: repeat(19, var(--cs));
  touch-action: none;
}
.ms-cell {
  width: var(--cs); height: var(--cs);
  background: var(--cell);
  display: flex; align-items: center; justify-content: center;
  font-size: calc(var(--cs) * .5);
  font-weight: 500;
  color: var(--ink);
}
.ms-cell.open { background: var(--bg); }
.ms-cell.flag { color: var(--ink-soft); font-size: calc(var(--cs) * .42); }

/* ============================================================
   SUDOKU
   ============================================================ */
.su-wrap { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
.su-board {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  grid-template-rows: repeat(9, 1fr);
  border: 2px solid var(--ink);
  background: var(--bg);
  touch-action: none;
}
.su-cell { position: relative; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.su-cell.bR { border-right: 2px solid var(--ink); }
.su-cell.bB { border-bottom: 2px solid var(--ink); }
.su-cell:nth-child(9n) { border-right: none; }
.su-cell:nth-child(n+73) { border-bottom: none; }
.su-val {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: var(--su-big);
}
.su-val.given { font-weight: 600; }
.su-val.user { font-weight: 400; color: var(--ink-soft); }
.su-marks {
  position: absolute; inset: 0;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
}
.su-marks span {
  display: flex; align-items: center; justify-content: center;
  font-size: var(--su-small);
  color: var(--faint);
}

/* ============================================================
   SNOOD
   ============================================================ */
.sn-wrap { flex: 1; min-height: 0; position: relative; }
.sn-wrap canvas { display: block; touch-action: none; border: 1px solid var(--line); }

/* ============================================================
   SET
   ============================================================ */
.set-wrap { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
.set-grid { display: grid; gap: 14px; }
.set-card {
  border: 1px solid var(--line);
  background: var(--bg);
  padding: 8px;
  display: flex; align-items: center; justify-content: center;
}
.set-card.sel { border: 2px solid var(--accent); padding: 7px; }
.set-card.dim { opacity: .35; }
.set-card svg { width: 100%; height: 100%; }

/* ============================================================
   FACADE (Sagrada-inspired)
   ============================================================ */
.fa-wrap {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 26px;
}
.fa-board {
  display: grid; gap: 2px;
  background: var(--line);
  border: 2px solid var(--ink);
}
.fa-cell {
  width: var(--fc); height: var(--fc);
  background: var(--bg);
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.fa-cell.bad { background: var(--cell); }
.fa-glyph { width: 76%; height: 76%; }
.fa-glyph svg { width: 100%; height: 100%; }
.fa-cell .cons { width: 76%; height: 76%; opacity: .3; }
.fa-cell .cons svg { width: 100%; height: 100%; }
.fa-cell .cons.fillcons {
  position: absolute; top: 5%; left: 5%;
  width: 40%; height: 40%;
}
.fa-tray {
  display: flex; flex-wrap: wrap; gap: 10px;
  justify-content: center;
  max-width: 100%;
}
.fa-piece { width: 62px; height: 62px; padding: 8px; }
.fa-piece.sel { border: 2px solid var(--accent); padding: 7px; }
.fa-piece svg { width: 100%; height: 100%; display: block; }

</style>
</head>
<body>

<!-- Shared SVG pattern definitions (hatched fill used by Set and Facade) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <pattern id="patHatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#57524A" stroke-width="2.5"/>
    </pattern>
  </defs>
</svg>

<!-- Home: game list + difficulty selection, nothing else -->
<div id="view-home" class="view">
  <header class="home-head">
    <h1>Logic Games</h1>
    <p class="sub">Choose a game and difficulty</p>
  </header>
  <div id="game-list"></div>
  <footer class="home-foot">
    <button id="btn-reset" class="linklike">Reset puzzle history</button>
  </footer>
</div>

<!-- Game screen: title, How to Play / New Game / Back to Menu, game area -->
<div id="view-game" class="view hidden">
  <header id="game-head">
    <div id="game-title"></div>
    <div class="head-actions">
      <button id="btn-howto">How to Play</button>
      <button id="btn-new">New Game</button>
      <button id="btn-menu">Back to Menu</button>
    </div>
  </header>
  <main id="game-root"></main>
</div>

<!-- How to Play overlay — a single tap anywhere dismisses it -->
<div id="overlay" class="hidden"><div id="overlay-box"></div></div>

<!-- Shown only in landscape: the app is portrait-only -->
<div id="rotate-note"><p>Turn your iPad upright to play.</p></div>

<script>
/* ============================================================
   PUZZLE DATA (generated) — 100 puzzles per difficulty for
   Sudoku, Set and Facade. Kept as plain JSON, separate from

'use strict';

function $(sel, el) { return (el || document).querySelector(sel); }

/* Small element factory used by every game. */
function el(tag, cls, text) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

   repeat until every puzzle has been played, then the cycle resets. */

  key: function (game, diff) { return 'lgc.played.' + game + '.' + diff; },
  played: function (game, diff) {
    try { return JSON.parse(localStorage.getItem(this.key(game, diff))) || []; }

  },
  save: function (game, diff, arr) {
    try { localStorage.setItem(this.key(game, diff), JSON.stringify(arr)); } catch (e) {}
  },
  draw: function (game, diff) {

    for (var i = 0; i < pool.length; i++) if (played.indexOf(i) === -1) unplayed.push(i);
    var idx = unplayed[Math.floor(Math.random() * unplayed.length)];
    played.push(idx);
    this.save(game, diff, played);
    return pool[idx];
  },
  remaining: function (game, diff) {
    return PUZZLES[game][diff].length - this.played(game, diff).length;
  },
  resetAll: function () {
    GAMES.forEach(function (g) {
      (g.diffs || []).forEach(function (d) {
        try { localStorage.removeItem(Store.key(g.id, d)); } catch (e) {}
      });
    });
  }
};

/* ---------- View switching ---------- */
var current = null;        /* running game instance */
var currentGame = null;
var currentDiff = null;

function showHome() {
  if (current && current.destroy) current.destroy();
  current = null; currentGame = null; currentDiff = null;
  renderHome();
  $('#view-game').classList.add('hidden');
  $('#view-home').classList.remove('hidden');
}

function launch(game, diff) {
  currentGame = game; currentDiff = diff;
  $('#view-home').classList.add('hidden');
  $('#view-game').classList.remove('hidden');
  $('#game-title').textContent = game.name + (diff ? ' — ' + DIFF_LABEL[diff] : '');
  startGame();
}

/* (Re)start the current game; games with difficulty draw a fresh puzzle. */
function startGame() {
  if (current && current.destroy) current.destroy();
  var root = $('#game-root');
  root.innerHTML = '';
  var puzzle = currentGame.diffs ? Store.draw(currentGame.id, currentDiff) : null;
  current = currentGame.start(root, currentDiff, puzzle);
}

/* ---------- How to Play overlay ---------- */
function showHowTo(game) {
  var box = $('#overlay-box');
  box.innerHTML = '';
  box.appendChild(el('h2', null, game.name + ' — How to Play'));
  game.howto.forEach(function (t) { box.appendChild(el('p', null, t)); });
  box.appendChild(el('p', 'overlay-dismiss', 'Tap anywhere to close'));
  $('#overlay').classList.remove('hidden');
}

/* ---------- Home screen ---------- */
function renderHome() {
  var list = $('#game-list');
  list.innerHTML = '';
  GAMES.forEach(function (game) {
    var row = el('div', 'game-row');
    row.appendChild(el('div', 'game-name', game.name));
    var btns = el('div', 'diff-btns');
    if (game.diffs) {
      game.diffs.forEach(function (d) {
        var b = el('button', null, DIFF_LABEL[d]);
        b.addEventListener('click', function () { launch(game, d); });
        btns.appendChild(b);
      });
    } else {
      var b = el('button', null, 'Play');
      b.addEventListener('click', function () { launch(game, null); });
      btns.appendChild(b);
    }
    row.appendChild(btns);
    /* Quiet depletion notices: plain small text, no colour, no icons. */
    if (game.diffs) {
      game.diffs.forEach(function (d) {
        var rem = Store.remaining(game.id, d);
        if (rem <= 10) {
          row.appendChild(el('div', 'notice',
            game.name + ' (' + DIFF_LABEL[d] + ') — ' + rem +
            (rem === 1 ? ' puzzle' : ' puzzles') + ' remaining, consider updating.'));
        }
      });
    }
    list.appendChild(row);
  });
}

/* ============================================================
   MINESWEEPER
   Fixed 19 × 27 board (portrait), 80 mines, no difficulty levels.
   The grid always fills the available screen (cell size is
   computed from the viewport — sized for iPad Mini in portrait).
   Controls: tap = reveal, press-and-hold = flag, or switch the
   toolbar to Flag mode so every tap flags. Tapping a satisfied
   number chords (opens its remaining neighbours).
   ============================================================ */
(function () {
  var COLS = 19, ROWS = 27, MINES = 80, N = COLS * ROWS;

  function Minesweeper(root) {
    var mines = null;                       /* Set of mine indices, placed on first reveal */
    var counts = new Array(N).fill(0);      /* -1 = mine, otherwise neighbour count */
    var open = new Array(N).fill(false);
    var flag = new Array(N).fill(false);
    var over = false, opened = 0, flags = 0, mode = 'reveal';

    /* --- toolbar --- */
    var bar = el('div', 'bar');
    var seg = el('div', 'seg');
    var bReveal = el('button', 'active', 'Reveal');
    var bFlag = el('button', null, 'Flag');
    seg.appendChild(bReveal); seg.appendChild(bFlag);
    var status = el('div', 'status', 'Tap to reveal. Hold to flag.');
    var info = el('div', 'small', '');
    bar.appendChild(seg); bar.appendChild(status); bar.appendChild(info);

    var wrap = el('div', 'ms-wrap');
    var grid = el('div', 'ms-grid');
    wrap.appendChild(grid);
    root.appendChild(bar); root.appendChild(wrap);

    var cells = [];
    for (var i = 0; i < N; i++) {
      var c = el('div', 'ms-cell');
      c.dataset.i = i;
      grid.appendChild(c);
      cells.push(c);
    }

    bReveal.addEventListener('click', function () {
      mode = 'reveal'; bReveal.classList.add('active'); bFlag.classList.remove('active');
    });
    bFlag.addEventListener('click', function () {
      mode = 'flag'; bFlag.classList.add('active'); bReveal.classList.remove('active');
    });

    function nbs(i) {
      var r = Math.floor(i / COLS), c = i % COLS, out = [];
      for (var dr = -1; dr <= 1; dr++) for (var dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        var rr = r + dr, cc = c + dc;
        if (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS) out.push(rr * COLS + cc);
      }
      return out;
    }

    /* Mines are placed after the first tap so the first tap is always safe
       (the tapped square and all its neighbours are kept clear). */
    function place(safe) {
      mines = new Set();
      var banned = new Set(nbs(safe)); banned.add(safe);
      while (mines.size < MINES) {
        var i = Math.floor(Math.random() * N);
        if (!banned.has(i)) mines.add(i);
      }
      for (var j = 0; j < N; j++) {
        counts[j] = mines.has(j) ? -1
          : nbs(j).filter(function (x) { return mines.has(x); }).length;
      }
    }

    function updateInfo() { info.textContent = MINES + ' mines · ' + flags + ' flagged'; }

    function render(i) {
      var c = cells[i];
      c.className = 'ms-cell' + (open[i] ? ' open' : '') + (flag[i] ? ' flag' : '');
      if (open[i]) c.textContent = counts[i] > 0 ? String(counts[i]) : (counts[i] === -1 ? '✕' : '');
      else c.textContent = flag[i] ? '◆' : '';
    }

    function reveal(i) {
      if (over || flag[i] || open[i]) return;
      if (!mines) place(i);
      if (mines.has(i)) { lose(); return; }
      var stack = [i];
      while (stack.length) {
        var j = stack.pop();
        if (open[j] || flag[j]) continue;
        open[j] = true; opened++; render(j);
        if (counts[j] === 0) nbs(j).forEach(function (k) { if (!open[k]) stack.push(k); });
      }
      if (!over && opened === N - MINES) win();
    }

    /* Chord: a revealed number with the right amount of flags around it
       opens all remaining unflagged neighbours. */
    function chord(i) {
      var f = nbs(i).filter(function (x) { return flag[x]; }).length;
      if (f === counts[i]) {
        nbs(i).forEach(function (k) { if (!flag[k] && !open[k]) reveal(k); });
      }
    }

    function toggleFlag(i) {
      if (over || open[i]) return;
      flag[i] = !flag[i]; flags += flag[i] ? 1 : -1;
      render(i); updateInfo();
    }

    function lose() {
      over = true;
      mines.forEach(function (i) { open[i] = true; render(i); });
      status.textContent = 'A mine. Tap New Game to try again.';
    }
    function win() {
      over = true;
      status.textContent = 'Board cleared. Well done.';
    }

    /* --- input: tap acts by mode, press-and-hold always flags ---
       Tracked per pointerId so a resting palm or a second finger
       cannot disturb a pencil tap. Secondary touches are ignored
       and any movement cancels the press-and-hold. */
    var touches = {};
    grid.addEventListener('pointerdown', function (e) {
      if (e.pointerType === 'touch' && !e.isPrimary) return;   /* palm / extra finger */
      var c = e.target.closest('.ms-cell');
      if (!c) return;
      var st = { cell: c, x: e.clientX, y: e.clientY, longFired: false, moved: false, timer: null };
      st.timer = setTimeout(function () {
        if (st.moved) return;
        st.longFired = true;
        toggleFlag(+c.dataset.i);
      }, 450);
      touches[e.pointerId] = st;
    });
    grid.addEventListener('pointermove', function (e) {
      var st = touches[e.pointerId];
      if (!st) return;
      if (Math.abs(e.clientX - st.x) > 9 || Math.abs(e.clientY - st.y) > 9) st.moved = true;
    });
    function drop(e) {
      var st = touches[e.pointerId];
      if (st) { clearTimeout(st.timer); delete touches[e.pointerId]; }
      return st;
    }
    grid.addEventListener('pointercancel', drop);
    grid.addEventListener('pointerup', function (e) {
      var st = drop(e);
      if (!st || st.longFired || st.moved || over) return;
      var i = +st.cell.dataset.i;
      if (open[i] && counts[i] > 0) { chord(i); return; }
      if (mode === 'flag') toggleFlag(i); else reveal(i);
    });

    /* --- sizing: cells scale so 27 × 19 always fills the space --- */
    function size() {
      var w = wrap.clientWidth, h = wrap.clientHeight;
      var cs = Math.max(10, Math.floor(Math.min(w / COLS, h / ROWS)) - 1);
      grid.style.setProperty('--cs', cs + 'px');
    }
    size();
    window.addEventListener('resize', size);
    updateInfo();

    this.destroy = function () { window.removeEventListener('resize', size); };
  }

  GAMES.push({
    id: 'minesweeper',
    name: 'Minesweeper',
    diffs: null,
    howto: [
      'The grid hides 80 mines. Reveal every square that does not contain a mine to win. Reveal a mine and the round ends.',
      'Tap a square to reveal it. A revealed number tells you how many of its eight neighbouring squares contain mines. A blank revealed square has no neighbouring mines, and automatically opens the area around it.',
      'Use the numbers to reason about where the mines must be. When you are sure a square hides a mine, mark it: press and hold any square to place or remove a mark, or switch the toolbar to Flag so that every tap marks instead of reveals.',
      'Shortcut: tapping a revealed number that already has the right amount of marks around it opens all of its remaining neighbours at once. Use with care — a wrongly placed mark will open a mine.',
      'Your first tap is always safe. There is no timer and nothing is scored; take as long as you like.'
    ],
    start: function (root) { return new Minesweeper(root); }
  });
})();

/* ============================================================
   SUDOKU
   9 × 9 grid with Apple Pencil candidate notation.
   Every empty cell is divided into nine invisible tap zones laid
   out like a keypad (top-left = 1 … bottom-right = 9).
     · light tap            -> toggles a small pencil-mark candidate
     · firm Apple Pencil tap -> enters the digit as a final answer
     · Pen mode (toolbar)   -> every tap enters a final answer
     · press-and-hold       -> clears everything in the cell
   Pencil marks are small and light; answers are large. Givens are
   bold and immutable. Puzzles come from the embedded PUZZLES data.
   ============================================================ */
(function () {
  /* Precomputed peers (same row / column / box) for candidate cleanup. */
  var PEERS = (function () {
    var P = [];
    for (var i = 0; i < 81; i++) {
      var r = Math.floor(i / 9), c = i % 9;
      var br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
      var s = new Set();
      for (var k = 0; k < 9; k++) { s.add(r * 9 + k); s.add(k * 9 + c); }
      for (var rr = br; rr < br + 3; rr++)
        for (var cc = bc; cc < bc + 3; cc++) s.add(rr * 9 + cc);
      s.delete(i);
      P.push(Array.from(s));
    }
    return P;
  })();

  var FIRM = 0.6;    /* Apple Pencil pressure above this = final answer
                        (a relaxed tap reads roughly 0.2–0.4, so 0.6
                        requires a clearly deliberate press) */

  function Sudoku(root, diff, puzzle) {
    var val = [], given = [], marks = [];
    for (var i = 0; i < 81; i++) {
      var v = +puzzle.g[i];
      val.push(v); given.push(v > 0); marks.push(new Set());
    }
    var mode = 'pencil', done = false;

    /* --- toolbar --- */
    var bar = el('div', 'bar');
    var seg = el('div', 'seg');
    var bPencil = el('button', 'active', 'Pencil');
    var bPen = el('button', null, 'Pen');
    seg.appendChild(bPencil); seg.appendChild(bPen);
    var status = el('div', 'status', '');
    var hint = el('div', 'small', 'Light tap = note · firm pencil press = answer · hold = clear cell');
    bar.appendChild(seg); bar.appendChild(status); bar.appendChild(hint);

    bPencil.addEventListener('click', function () {
      mode = 'pencil'; bPencil.classList.add('active'); bPen.classList.remove('active');
    });
    bPen.addEventListener('click', function () {
      mode = 'pen'; bPen.classList.add('active'); bPencil.classList.remove('active');
    });

    /* --- board --- */
    var wrap = el('div', 'su-wrap');
    var board = el('div', 'su-board');
    var cells = [];
    for (var j = 0; j < 81; j++) {
      var cell = el('div', 'su-cell');
      cell.dataset.i = j;
      var r = Math.floor(j / 9), c = j % 9;
      if (c % 3 === 2 && c < 8) cell.classList.add('bR');   /* thick 3×3 box lines */
      if (r % 3 === 2 && r < 8) cell.classList.add('bB');
      board.appendChild(cell);
      cells.push(cell);
    }
    wrap.appendChild(board);
    root.appendChild(bar); root.appendChild(wrap);

    function render(i) {
      var c = cells[i];
      c.innerHTML = '';
      if (val[i]) {
        c.appendChild(el('div', 'su-val ' + (given[i] ? 'given' : 'user'), String(val[i])));
      } else if (marks[i].size) {
        var m = el('div', 'su-marks');
        for (var n = 1; n <= 9; n++) m.appendChild(el('span', null, marks[i].has(n) ? String(n) : ''));
        c.appendChild(m);
      }
    }
    for (var q = 0; q < 81; q++) render(q);

    /* --- actions --- */
    function act(i, n, pen) {
      if (pen) {
        if (val[i] === n) {                 /* tap the same digit again to erase it */
          val[i] = 0;
        } else {
          val[i] = n;
          marks[i].clear();
          /* An answer quietly removes that candidate from row/column/box. */
          PEERS[i].forEach(function (p) { if (marks[p].delete(n)) render(p); });
        }
        render(i); check();
      } else {
        if (val[i]) return;                 /* pencil marks live only in empty cells */
        if (marks[i].has(n)) marks[i].delete(n); else marks[i].add(n);
        render(i);
      }
    }

    function check() {
      for (var i = 0; i < 81; i++) if (!val[i]) { status.textContent = ''; return; }
      var ok = true;
      for (var j = 0; j < 81; j++) if (String(val[j]) !== puzzle.s[j]) { ok = false; break; }
      status.textContent = ok ? 'Solved.' : 'The grid is full, but something is off.';
      if (ok) done = true;
    }

    /* --- pointer handling: zones, pressure, press-and-hold ---
       Every pointer is tracked independently by pointerId, so a
       palm resting on the glass or a stray second finger cannot
       corrupt a pencil tap. Secondary touches are ignored outright.
       The zone is locked in at pointer-down (the most accurate
       moment for a pencil tap); movement cancels the gesture. */
    var touches = {};

    board.addEventListener('pointerdown', function (e) {
      if (e.pointerType === 'touch' && !e.isPrimary) return;   /* palm / extra finger */
      var cell = e.target.closest('.su-cell');
      if (!cell) return;
      var rect = cell.getBoundingClientRect();
      var zx = Math.min(2, Math.max(0, Math.floor((e.clientX - rect.left) / (rect.width / 3))));
      var zy = Math.min(2, Math.max(0, Math.floor((e.clientY - rect.top) / (rect.height / 3))));
      var st = {
        cell: cell,
        x: e.clientX, y: e.clientY,
        zone: zy * 3 + zx + 1,           /* keypad zone decided at touch-down */
        pMax: e.pressure || 0,
        longFired: false, moved: false, timer: null
      };
      st.timer = setTimeout(function () {  /* press-and-hold clears the cell */
        if (st.moved) return;
        st.longFired = true;
        var i = +cell.dataset.i;
        if (!given[i] && !done) { val[i] = 0; marks[i].clear(); render(i); status.textContent = ''; }
      }, 500);
      touches[e.pointerId] = st;
    });

    board.addEventListener('pointermove', function (e) {
      var st = touches[e.pointerId];
      if (!st) return;
      st.pMax = Math.max(st.pMax, e.pressure || 0);
      if (Math.abs(e.clientX - st.x) > 9 || Math.abs(e.clientY - st.y) > 9) st.moved = true;
    });

    function drop(e) {
      var st = touches[e.pointerId];
      if (st) { clearTimeout(st.timer); delete touches[e.pointerId]; }
      return st;
    }
    board.addEventListener('pointercancel', drop);

    board.addEventListener('pointerup', function (e) {
      var st = drop(e);
      if (!st || st.longFired || st.moved || done) return;
      var i = +st.cell.dataset.i;
      if (given[i]) return;
      st.pMax = Math.max(st.pMax, e.pressure || 0);
      /* Firm Apple Pencil press is always a final answer; otherwise the mode decides. */
      var pen = mode === 'pen' || (e.pointerType === 'pen' && st.pMax >= FIRM);
      act(i, st.zone, pen);
    });

    /* --- sizing: square board, generous digits --- */
    function size() {
      var s = Math.floor(Math.min(wrap.clientWidth, wrap.clientHeight));
      board.style.width = s + 'px';
      board.style.height = s + 'px';
      board.style.setProperty('--su-big', (s / 9 * 0.58) + 'px');
      board.style.setProperty('--su-small', (s / 9 * 0.30) + 'px');
    }
    size();
    window.addEventListener('resize', size);

    this.destroy = function () { window.removeEventListener('resize', size); };
  }

  GAMES.push({
    id: 'sudoku',
    name: 'Sudoku',
    diffs: ['easy', 'medium', 'hard'],
    howto: [
      'Fill the 9 × 9 grid so that every row, every column and every outlined 3 × 3 box contains the digits 1 to 9 exactly once. The bold printed digits are fixed clues and cannot be changed.',
      'Entering digits works by position: each empty cell is divided into nine invisible zones arranged like a keypad — top-left is 1, top-middle is 2, top-right is 3, and so on down to bottom-right, which is 9. Tap the zone of the digit you want.',
      'Pencil marks: a light tap writes a small, light candidate number in that spot of the cell — a note to yourself that the digit is still possible there. Tap the same zone again to erase just that one mark. A cell can hold as many marks as you like.',
      'Final answers: press firmly with the Apple Pencil, or switch the toolbar from Pencil to Pen, and the tapped digit is entered full-size as your answer. Entering an answer clears that cell’s notes and removes the digit from pencil marks in the same row, column and box. Tap the same zone again to remove the answer.',
      'Press and hold any cell to clear everything you have written in it. The puzzle is solved when every cell is filled correctly — the app will quietly tell you.'
    ],
    start: function (root, diff, puzzle) { return new Sudoku(root, diff, puzzle); }
  });
})();

/* ============================================================
   SNOOD (bubble shooter)
   Muted monochrome pieces told apart by pattern, not colour:
     0 solid · 1 ring · 2 hatched · 3 dotted · 4 crossed
   Drag to aim, release to shoot. Groups of 3+ pop; pieces cut
   off from the ceiling fall away. Every 8th shot the ceiling
   drops one row. Clear the field to win; reach the line to lose.
   No score, no timer. Canvas-based; random field each game.
   ============================================================ */
(function () {
  var COLS = 11, TYPES = 5, START_ROWS = 6, DROP_EVERY = 8;

  function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#000';
  }

  function Snood(root) {
    var self = this;
    var bar = el('div', 'bar');
    var status = el('div', 'status', 'Drag to aim, release to shoot.');
    var dropNote = el('div', 'small', '');
    bar.appendChild(status); bar.appendChild(dropNote);

    var wrap = el('div', 'sn-wrap');
    var canvas = document.createElement('canvas');
    wrap.appendChild(canvas);
    root.appendChild(bar); root.appendChild(wrap);
    var ctx = canvas.getContext('2d');

    var INK = cssVar('--ink'), SOFT = cssVar('--ink-soft'), FAINT = cssVar('--faint'),
        LINE = cssVar('--line'), BG = cssVar('--bg');

    var W = 0, H = 0, R = 0, rowH = 0, topPad = 4;
    var rows = [];        /* rows[r][c] = type or -1; even rows have 11 cells, odd 10 */
    var offset = 0;       /* how many rows the ceiling has dropped */
    var shots = 0, over = false;
    var ball = null;      /* {x, y, vx, vy, t} in flight */
    var cur = 0, next = 0;
    var aim = null;       /* aim angle while the pointer is down */
    var raf = 0, lastTs = 0;

    function rowLen(r) { return COLS - (r % 2); }
    function ensureRow(r) {
      while (rows.length <= r) rows.push(new Array(rowLen(rows.length)).fill(-1));
    }
    /* Geometry: bubble centres in canvas coordinates. */
    function bx(r, c) { return R * 1.5 + (r % 2) * R + c * 2 * R; }
    function by(r) { return topPad + (offset + r) * rowH + R; }
    function ceilingY() { return topPad + offset * rowH; }
    function shooterX() { return W / 2; }
    function shooterY() { return H - R - 12; }
    function deadlineY() { return shooterY() - 3.2 * R; }

    function present() {
      var s = new Set();
      rows.forEach(function (row) { row.forEach(function (t) { if (t >= 0) s.add(t); }); });
      return Array.from(s);
    }
    function randType() {
      var p = present();
      return p.length ? p[Math.floor(Math.random() * p.length)] : 0;
    }

    function reset() {
      rows = [];
      for (var r = 0; r < START_ROWS; r++) {
        ensureRow(r);
        for (var c = 0; c < rowLen(r); c++) rows[r][c] = Math.floor(Math.random() * TYPES);
      }
      offset = 0; shots = 0; over = false; ball = null;
      cur = Math.floor(Math.random() * TYPES);
      next = Math.floor(Math.random() * TYPES);
      updateDropNote();
    }

    function updateDropNote() {
      var left = DROP_EVERY - (shots % DROP_EVERY);
      dropNote.textContent = 'Ceiling drops after ' + left + (left === 1 ? ' shot' : ' shots');
    }

    /* --- hex-offset neighbours --- */
    function neighbors(r, c) {
      var out = [], cand;
      if (r % 2 === 0) {                          /* long row: short rows sit at c-1, c */
        cand = [[r, c - 1], [r, c + 1], [r - 1, c - 1], [r - 1, c], [r + 1, c - 1], [r + 1, c]];
      } else {                                    /* short row: long rows sit at c, c+1 */
        cand = [[r, c - 1], [r, c + 1], [r - 1, c], [r - 1, c + 1], [r + 1, c], [r + 1, c + 1]];
      }
      cand.forEach(function (p) {
        var rr = p[0], cc = p[1];
        if (rr >= 0 && rr < rows.length && cc >= 0 && cc < rowLen(rr)) out.push([rr, cc]);
      });
      return out;
    }

    /* --- grid resolution after a ball sticks --- */
    function popMatches(r, c) {
      var type = rows[r][c];
      var seen = {}, stack = [[r, c]], group = [];
      seen[r + ',' + c] = true;
      while (stack.length) {
        var cell = stack.pop(); group.push(cell);
        neighbors(cell[0], cell[1]).forEach(function (nb) {
          var key = nb[0] + ',' + nb[1];
          if (!seen[key] && rows[nb[0]][nb[1]] === type) { seen[key] = true; stack.push(nb); }
        });
      }
      if (group.length >= 3) {
        group.forEach(function (g) { rows[g[0]][g[1]] = -1; });
        dropFloaters();
        return true;
      }
      return false;
    }

    function dropFloaters() {
      var anchored = {}, stack = [];
      if (rows.length) {
        for (var c = 0; c < rowLen(0); c++) {
          if (rows[0][c] >= 0) { anchored['0,' + c] = true; stack.push([0, c]); }
        }
      }
      while (stack.length) {
        var cell = stack.pop();
        neighbors(cell[0], cell[1]).forEach(function (nb) {
          var key = nb[0] + ',' + nb[1];
          if (!anchored[key] && rows[nb[0]][nb[1]] >= 0) { anchored[key] = true; stack.push(nb); }
        });
      }
      for (var r = 0; r < rows.length; r++) {
        for (var cc = 0; cc < rows[r].length; cc++) {
          if (rows[r][cc] >= 0 && !anchored[r + ',' + cc]) rows[r][cc] = -1;
        }
      }
      while (rows.length && rows[rows.length - 1].every(function (t) { return t < 0; })) rows.pop();
    }

    function fieldEmpty() {
      return rows.every(function (row) { return row.every(function (t) { return t < 0; }); });
    }

    function checkLose() {
      for (var r = 0; r < rows.length; r++) {
        for (var c = 0; c < rows[r].length; c++) {
          if (rows[r][c] >= 0 && by(r) + R > deadlineY()) return true;
        }
      }
      return false;
    }

    /* Snap the flying ball to the nearest free cell and resolve. */
    function stick() {
      var r = Math.round((ball.y - topPad - R) / rowH) - offset;
      if (r < 0) r = 0;
      ensureRow(r);
      var c = Math.round((ball.x - bx(r, 0)) / (2 * R));
      c = Math.min(rowLen(r) - 1, Math.max(0, c));
      if (rows[r][c] >= 0) {
        /* occupied: choose the nearest free neighbouring cell */
        var best = null, bestD = 1e9;
        var cand = neighbors(r, c).slice();
        ensureRow(r + 1);
        for (var cc = 0; cc < rowLen(r + 1); cc++) cand.push([r + 1, cc]);
        cand.forEach(function (p) {
          if (rows[p[0]][p[1]] < 0) {
            var dx = bx(p[0], p[1]) - ball.x, dy = by(p[0]) - ball.y;
            var d = dx * dx + dy * dy;
            if (d < bestD) { bestD = d; best = p; }
          }
        });
        if (best) { r = best[0]; c = best[1]; }
      }
      rows[r][c] = ball.t;
      ball = null;
      popMatches(r, c);
      shots++;
      if (shots % DROP_EVERY === 0) offset++;
      updateDropNote();
      if (fieldEmpty()) { over = true; status.textContent = 'Field cleared. Well done.'; return; }
      if (checkLose()) { over = true; status.textContent = 'The pieces reached the line. Tap New Game.'; return; }
      cur = next; next = randType();
    }

    /* --- drawing --- */
    function drawPiece(x, y, t, rad) {
      ctx.strokeStyle = INK; ctx.lineWidth = 1.5;
      ctx.fillStyle = BG;
      ctx.beginPath(); ctx.arc(x, y, rad, 0, 7); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = SOFT; ctx.fillStyle = SOFT;
      if (t === 0) {                                    /* solid */
        ctx.beginPath(); ctx.arc(x, y, rad * 0.62, 0, 7); ctx.fill();
      } else if (t === 1) {                             /* ring */
        ctx.lineWidth = rad * 0.22;
        ctx.beginPath(); ctx.arc(x, y, rad * 0.48, 0, 7); ctx.stroke();
      } else if (t === 2) {                             /* hatched */
        ctx.save();
        ctx.beginPath(); ctx.arc(x, y, rad * 0.72, 0, 7); ctx.clip();
        ctx.lineWidth = 1.6;
        for (var d = -rad; d <= rad; d += rad * 0.38) {
          ctx.beginPath();
          ctx.moveTo(x + d - rad, y + rad); ctx.lineTo(x + d + rad, y - rad);
          ctx.stroke();
        }
        ctx.restore();
      } else if (t === 3) {                             /* dotted */
        var dr = rad * 0.14;
        var pts = [[0, 0], [0.5, 0], [-0.5, 0], [0.25, 0.43], [-0.25, 0.43], [0.25, -0.43], [-0.25, -0.43]];
        pts.forEach(function (p) {
          ctx.beginPath(); ctx.arc(x + p[0] * rad, y + p[1] * rad, dr, 0, 7); ctx.fill();
        });
      } else {                                          /* crossed */
        ctx.lineWidth = rad * 0.18;
        var a = rad * 0.5;
        ctx.beginPath();
        ctx.moveTo(x - a, y); ctx.lineTo(x + a, y);
        ctx.moveTo(x, y - a); ctx.lineTo(x, y + a);
        ctx.stroke();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      /* ceiling */
      ctx.strokeStyle = INK; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, ceilingY()); ctx.lineTo(W, ceilingY()); ctx.stroke();
      /* deadline */
      ctx.strokeStyle = LINE; ctx.lineWidth = 1;
      ctx.setLineDash([6, 6]);
      ctx.beginPath(); ctx.moveTo(0, deadlineY()); ctx.lineTo(W, deadlineY()); ctx.stroke();
      ctx.setLineDash([]);
      /* field */
      for (var r = 0; r < rows.length; r++) {
        for (var c = 0; c < rows[r].length; c++) {
          if (rows[r][c] >= 0) drawPiece(bx(r, c), by(r), rows[r][c], R - 1.5);
        }
      }
      /* aim guide */
      var sx = shooterX(), sy = shooterY();
      if (aim != null && !over && !ball) {
        ctx.strokeStyle = FAINT; ctx.lineWidth = 1;
        ctx.setLineDash([4, 6]);
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(sx + Math.cos(aim) * R * 9, sy + Math.sin(aim) * R * 9);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      /* ball in flight */
      if (ball) drawPiece(ball.x, ball.y, ball.t, R - 1.5);
      /* shooter: current piece + smaller preview of the next one */
      if (!over) {
        if (!ball) drawPiece(sx, sy, cur, R - 1.5);
        drawPiece(sx + 3.2 * R, sy, next, R * 0.55);
        ctx.fillStyle = FAINT;
        ctx.font = (R * 0.55) + 'px inherit';
      }
    }

    /* --- game loop --- */
    function frame(ts) {
      raf = requestAnimationFrame(frame);
      var dt = Math.min(0.033, (ts - lastTs) / 1000 || 0.016);
      lastTs = ts;
      if (ball) {
        /* sub-steps keep fast shots from tunnelling through the field */
        for (var s = 0; s < 3 && ball; s++) {
          ball.x += ball.vx * dt / 3;
          ball.y += ball.vy * dt / 3;
          if (ball.x < R) { ball.x = R; ball.vx = -ball.vx; }
          if (ball.x > W - R) { ball.x = W - R; ball.vx = -ball.vx; }
          if (ball.y - R <= ceilingY()) { stick(); break; }
          var hit = false;
          for (var r = 0; r < rows.length && !hit; r++) {
            for (var c = 0; c < rows[r].length && !hit; c++) {
              if (rows[r][c] >= 0) {
                var dx = ball.x - bx(r, c), dy = ball.y - by(r);
                if (dx * dx + dy * dy < (1.82 * R) * (1.82 * R)) hit = true;
              }
            }
          }
          if (hit) { stick(); break; }
        }
      }
      draw();
    }

    /* --- input: drag to aim, release to fire --- */
    function angleTo(e) {
      var rect = canvas.getBoundingClientRect();
      var px = e.clientX - rect.left, py = e.clientY - rect.top;
      var a = Math.atan2(py - shooterY(), px - shooterX());
      /* keep the shot pointing upward (angle in [-π+MIN, -MIN]) */
      var MIN = 0.18;
      if (a >= 0) a = (px >= shooterX()) ? -MIN : -Math.PI + MIN;  /* pointer below the launcher */
      if (a > -MIN) a = -MIN;
      if (a < -Math.PI + MIN) a = -Math.PI + MIN;
      return a;
    }
    canvas.addEventListener('pointerdown', function (e) { aim = angleTo(e); });
    canvas.addEventListener('pointermove', function (e) { if (aim != null) aim = angleTo(e); });
    canvas.addEventListener('pointerup', function (e) {
      if (aim == null) return;
      var a = angleTo(e);
      aim = null;
      if (over || ball) return;
      var sp = Math.max(W, H) * 1.6;
      ball = { x: shooterX(), y: shooterY(), vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, t: cur };
    });
    canvas.addEventListener('pointercancel', function () { aim = null; });

    /* --- sizing --- */
    function size() {
      var dpr = window.devicePixelRatio || 1;
      W = wrap.clientWidth; H = wrap.clientHeight;
      canvas.width = Math.max(1, W * dpr);
      canvas.height = Math.max(1, H * dpr);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      R = W / (2 * COLS + 2);
      rowH = R * 1.732;
    }
    size();
    window.addEventListener('resize', size);
    reset();
    raf = requestAnimationFrame(frame);

    this.destroy = function () {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', size);
    };
  }

  GAMES.push({
    id: 'snood',
    name: 'Snood',
    diffs: null,
    howto: [
      'A field of pieces hangs from the top of the screen. Clear all of them to win. Pieces come in five kinds, told apart by the pattern inside them: solid, ring, hatched, dotted and crossed.',
      'Touch and drag anywhere on the field to aim — a short dashed guide shows the direction — then lift your pencil or finger to shoot the piece waiting at the bottom. Shots bounce off the side walls, which is often the best way to reach awkward corners.',
      'When your shot touches the hanging field it sticks where it lands. If that creates a group of three or more matching pieces, the whole group pops. Any pieces left with no connection to the ceiling fall away too — cutting a big cluster free at its anchor is the heart of the game.',
      'The small piece beside the launcher shows what comes after the current one, so you can plan a step ahead. You are only ever given kinds that are still on the field.',
      'Every eighth shot the ceiling moves one row closer. If the field ever reaches the dashed line near your launcher, the round is over. No score, no clock — just clear the board.'
    ],
    start: function (root) { return new Snood(root); }
  });
})();

/* ============================================================
   SET (card pattern matching)
   Monochrome deck. Card features:
     shape  : circle / triangle / square
     count  : one / two / three symbols
     fill   : hollow / solid / hatched
     stroke : thin / thick / dashed   (Medium and Hard only)
   Three cards form a set when every feature, checked on its own,
   is all-same or all-different across the three cards.
   The layout is a fixed embedded puzzle; find every set it hides.
   ============================================================ */
(function () {
  var CONF = {
    easy:   { cols: 3, rows: 3 },   /* 9 cards, 3 features  */
    medium: { cols: 4, rows: 3 },   /* 12 cards, 4 features */
    hard:   { cols: 5, rows: 3 }    /* 15 cards, 4 features */
  };

  /* Feature values are 0/1/2, so "all same or all different"
     is exactly "the sum is divisible by 3". */
  function isSet(a, b, c) {
    for (var k = 0; k < 4; k++) if ((a[k] + b[k] + c[k]) % 3 !== 0) return false;
    return true;
  }

  function allSets(cards) {
    var out = [];
    for (var i = 0; i < cards.length; i++)
      for (var j = i + 1; j < cards.length; j++)
        for (var k = j + 1; k < cards.length; k++)
          if (isSet(cards[i], cards[j], cards[k])) out.push(i + ',' + j + ',' + k);
    return out;
  }

  function cardSVG(card) {
    var sh = card[0], ct = card[1], fl = card[2], st = card[3];
    var ys = [[95], [62, 128], [35, 95, 155]][ct];
    var body = '';
    ys.forEach(function (y) {
      var cls = 'sym fl' + fl + ' st' + st;
      if (sh === 0) body += '<circle class="' + cls + '" cx="60" cy="' + y + '" r="26"/>';
      else if (sh === 1) body += '<polygon class="' + cls + '" points="60,' + (y - 28) + ' 88,' + (y + 21) + ' 32,' + (y + 21) + '"/>';
      else body += '<rect class="' + cls + '" x="34" y="' + (y - 26) + '" width="52" height="52"/>';
    });
    return '<svg viewBox="0 0 120 190" xmlns="http://www.w3.org/2000/svg">' + body + '</svg>';
  }

  function SetGame(root, diff, puzzle) {
    var conf = CONF[diff];
    var cards = puzzle.cards;
    var sets = allSets(cards);          /* recomputed locally; data also stores the count */
    var found = new Set();
    var sel = [];

    var bar = el('div', 'bar');
    var status = el('div', 'status', 'Tap three cards that form a set.');
    var prog = el('div', 'small', '');
    bar.appendChild(status); bar.appendChild(prog);

    var wrap = el('div', 'set-wrap');
    var gridEl = el('div', 'set-grid');
    wrap.appendChild(gridEl);
    root.appendChild(bar); root.appendChild(wrap);

    var cardEls = cards.map(function (c, i) {
      var d = el('div', 'set-card');
      d.dataset.i = i;
      d.innerHTML = cardSVG(c);
      d.addEventListener('click', function () { tap(i); });
      gridEl.appendChild(d);
      return d;
    });

    function progress() { prog.textContent = 'Sets found: ' + found.size + ' of ' + sets.length; }

    function tap(i) {
      var d = cardEls[i];
      var at = sel.indexOf(i);
      if (at >= 0) { sel.splice(at, 1); d.classList.remove('sel'); return; }
      sel.push(i);
      d.classList.add('sel');
      if (sel.length < 3) return;

      var trio = sel.slice().sort(function (a, b) { return a - b; });
      var key = trio.join(',');
      var els = sel.map(function (x) { return cardEls[x]; });
      sel = [];
      els.forEach(function (e) { e.classList.remove('sel'); });

      if (isSet(cards[trio[0]], cards[trio[1]], cards[trio[2]])) {
        if (found.has(key)) {
          status.textContent = 'Already found that one.';
        } else {
          found.add(key);
          progress();
          status.textContent = found.size === sets.length
            ? 'All sets found. Nicely done.'
            : 'That is a set.';
        }
      } else {
        status.textContent = 'Not a set — each feature must be all same or all different.';
        els.forEach(function (e) { e.classList.add('dim'); });
        setTimeout(function () { els.forEach(function (e) { e.classList.remove('dim'); }); }, 350);
      }
    }

    /* Cards keep a 120:190 aspect and fill the available space. */
    function size() {
      var w = wrap.clientWidth, h = wrap.clientHeight, g = 14;
      var cw = Math.min(
        (w - g * (conf.cols - 1)) / conf.cols,
        (h - g * (conf.rows - 1)) / conf.rows * 120 / 190
      );
      cw = Math.max(40, Math.floor(cw));
      gridEl.style.gridTemplateColumns = 'repeat(' + conf.cols + ',' + cw + 'px)';
      gridEl.style.gridAutoRows = Math.floor(cw * 190 / 120) + 'px';
    }
    size();
    window.addEventListener('resize', size);
    progress();

    this.destroy = function () { window.removeEventListener('resize', size); };
  }

  GAMES.push({
    id: 'set',
    name: 'Set',
    diffs: ['easy', 'medium', 'hard'],
    howto: [
      'Every card shows symbols with a few features: the shape (circle, triangle or square), how many symbols there are (one, two or three), and the fill (hollow, solid or hatched). On Medium and Hard the outline is a fourth feature: thin, thick or dashed.',
      'Three cards form a set when, for each feature checked on its own, the three cards are either all the same or all different. One mismatched feature — two alike and one odd — and it is not a set.',
      'An example: one hollow circle, two hollow triangles, three hollow squares. Counts all different, shapes all different, fills all the same — a valid set.',
      'Tap three cards to try them. A valid new set is added to your count; an invalid trio fades for a moment. Cards always stay on the table, because one card can belong to several different sets.',
      'The counter shows how many sets are hidden in this layout. Find every one of them to finish the puzzle.'
    ],
    start: function (root, diff, puzzle) { return new SetGame(root, diff, puzzle); }
  });
})();

/* ============================================================
   FACADE (Sagrada-inspired shape placement)
   No colour: pieces are shape + fill only.
     shapes : circle / square / triangle / diamond
     fills  : hollow / solid / hatched
   Fill the grid with every piece from the tray. Orthogonal
   neighbours may never share a shape or a fill. Some cells
   require a specific shape (large pale outline) or a specific
   fill (small pale corner swatch). Every embedded puzzle has
   at least one complete solution.
   ============================================================ */
(function () {
  function glyph(shape, fill) {
    var cls = 'sym fl' + fill + ' st0';
    var s;
    if (shape === 0) s = '<circle class="' + cls + '" cx="50" cy="50" r="32"/>';
    else if (shape === 1) s = '<rect class="' + cls + '" x="20" y="20" width="60" height="60"/>';
    else if (shape === 2) s = '<polygon class="' + cls + '" points="50,14 86,78 14,78"/>';
    else s = '<polygon class="' + cls + '" points="50,12 88,50 50,88 12,50"/>';
    return '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">' + s + '</svg>';
  }
  /* Small square swatch used to show a required fill. */
  function swatch(fill) {
    return '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">' +
      '<rect class="sym fl' + fill + ' st0" x="22" y="22" width="56" height="56"/></svg>';
  }

  function Facade(root, diff, puzzle) {
    var R = puzzle.r, C = puzzle.c, N = R * C;
    var cons = new Array(N).fill(null);       /* [type 0=shape 1=fill, value] */
    puzzle.cons.forEach(function (cn) { cons[cn[0]] = [cn[1], cn[2]]; });
    var pieces = puzzle.pcs.map(function (p) {
      return { s: Math.floor(p / 3), f: p % 3, used: false };
    });
    var placed = new Array(N).fill(-1);       /* index into pieces, or -1 */
    var sel = -1, done = false;

    var bar = el('div', 'bar');
    var status = el('div', 'status', 'Pick a piece, then tap a cell.');
    var rule = el('div', 'small', 'Touching pieces may never share a shape or a fill');
    bar.appendChild(status); bar.appendChild(rule);

    var wrap = el('div', 'fa-wrap');
    var board = el('div', 'fa-board');
    board.style.gridTemplateColumns = 'repeat(' + C + ', var(--fc))';
    var cells = [];
    for (var i = 0; i < N; i++) {
      var cEl = el('div', 'fa-cell');
      cEl.dataset.i = i;
      board.appendChild(cEl);
      cells.push(cEl);
    }
    var tray = el('div', 'fa-tray');
    var trayBtns = pieces.map(function (p, i) {
      var b = el('button', 'fa-piece');
      b.dataset.i = i;
      b.innerHTML = glyph(p.s, p.f);
      b.addEventListener('click', function () { pick(i); });
      tray.appendChild(b);
      return b;
    });
    wrap.appendChild(board); wrap.appendChild(tray);
    root.appendChild(bar); root.appendChild(wrap);

    function renderCell(i) {
      var cEl = cells[i];
      cEl.innerHTML = '';
      if (placed[i] >= 0) {
        var p = pieces[placed[i]];
        var d = el('div', 'fa-glyph');
        d.innerHTML = glyph(p.s, p.f);
        cEl.appendChild(d);
      } else if (cons[i]) {
        var t = cons[i][0], v = cons[i][1];
        var g = el('div', 'cons' + (t === 1 ? ' fillcons' : ''));
        g.innerHTML = t === 0 ? glyph(v, 0) : swatch(v);
        cEl.appendChild(g);
      }
    }
    for (var q = 0; q < N; q++) renderCell(q);

    function fits(i, p) {
      if (cons[i]) {
        var t = cons[i][0], v = cons[i][1];
        if (t === 0 && p.s !== v) return 'This cell requires a certain shape.';
        if (t === 1 && p.f !== v) return 'This cell requires a certain fill.';
      }
      var r = Math.floor(i / C), c = i % C;
      var around = [[r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]];
      for (var k = 0; k < 4; k++) {
        var rr = around[k][0], cc = around[k][1];
        if (rr < 0 || rr >= R || cc < 0 || cc >= C) continue;
        var q = placed[rr * C + cc];
        if (q >= 0) {
          var u = pieces[q];
          if (u.s === p.s) return 'A touching piece already has that shape.';
          if (u.f === p.f) return 'A touching piece already has that fill.';
        }
      }
      return null;
    }

    function pick(i) {
      if (pieces[i].used) return;
      if (sel === i) { sel = -1; trayBtns[i].classList.remove('sel'); return; }
      if (sel >= 0) trayBtns[sel].classList.remove('sel');
      sel = i;
      trayBtns[i].classList.add('sel');
    }

    board.addEventListener('click', function (e) {
      var cEl = e.target.closest('.fa-cell');
      if (!cEl) return;
      var i = +cEl.dataset.i;
      if (placed[i] >= 0) {
        /* take a placed piece back to the tray */
        var pi = placed[i];
        placed[i] = -1;
        pieces[pi].used = false;
        trayBtns[pi].style.display = '';
        renderCell(i);
        done = false;
        status.textContent = 'Pick a piece, then tap a cell.';
        return;
      }
      if (sel < 0) { status.textContent = 'Pick a piece from the tray first.'; return; }
      var p = pieces[sel];
      var problem = fits(i, p);
      if (problem) {
        status.textContent = problem;
        cEl.classList.add('bad');
        setTimeout(function () { cEl.classList.remove('bad'); }, 320);
        return;
      }
      placed[i] = sel;
      p.used = true;
      trayBtns[sel].style.display = 'none';
      trayBtns[sel].classList.remove('sel');
      sel = -1;
      renderCell(i);
      var full = placed.every(function (x) { return x >= 0; });
      status.textContent = full ? 'Facade complete. Well done.' : '';
      if (full) done = true;
    });

    function size() {
      var w = wrap.clientWidth, h = wrap.clientHeight;
      var trayH = Math.max(92, h * 0.24);
      var fc = Math.floor(Math.min((w - 24) / C, (h - trayH - 44) / R));
      fc = Math.max(48, fc);
      board.style.setProperty('--fc', fc + 'px');
    }
    size();
    window.addEventListener('resize', size);

    this.destroy = function () { window.removeEventListener('resize', size); };
  }

  GAMES.push({
    id: 'facade',
    name: 'Facade',
    diffs: ['easy', 'medium', 'hard'],
    howto: [
      'Inspired by the board game Sagrada. Fill the whole grid using the pieces in the tray. Every piece has two attributes: a shape (circle, square, triangle or diamond) and a fill (hollow, solid or hatched).',
      'One rule governs everything: neighbouring pieces may never match. A piece may not sit directly above, below, left or right of a piece with the same shape, or with the same fill. Diagonals are free.',
      'Some cells carry a requirement. A large pale outline means the piece placed there must be that shape. A small pale square tucked into the corner shows a fill the piece placed there must have.',
      'Tap a piece in the tray to pick it up, then tap an empty cell to place it. If a placement would break a rule, the cell darkens briefly and nothing happens — the message above the board tells you why. Tap any placed piece to return it to the tray, and rearrange as often as you like.',
      'Every puzzle can be completed. If you get stuck, unwind a few pieces and try a different arrangement — the cells with requirements are usually the best place to start.'
    ],
    start: function (root, diff, puzzle) { return new Facade(root, diff, puzzle); }
  });
})();

/* ============================================================
   BOOT — wire up the chrome, render the home screen, register
   the offline service worker.
   ============================================================ */
(function () {
  $('#btn-menu').addEventListener('click', showHome);
  $('#btn-new').addEventListener('click', function () { if (currentGame) startGame(); });
  $('#btn-howto').addEventListener('click', function () { if (currentGame) showHowTo(currentGame); });
  $('#overlay').addEventListener('click', function () { $('#overlay').classList.add('hidden'); });
  $('#btn-reset').addEventListener('click', function () { Store.resetAll(); renderHome(); });

  /* No pinch zoom or magnifier side effects during play. */
  document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
  document.addEventListener('contextmenu', function (e) { e.preventDefault(); });

  renderHome();

  /* ---------- Service worker (offline) ----------
     The whole app lives in this one file, so the worker only needs
     to cache the page itself and answer every fetch from that cache.
     It is registered from an in-page Blob to keep the app single-file.
     Note: some engines refuse Blob-URL service workers; that is fine —
     the file has zero external dependencies, so it also runs entirely
     offline without one (e.g. opened locally or saved to Files). */
  var SW_SRC =
    "var C='logic-games-v1';" +
    "self.addEventListener('install',function(e){" +
    "  e.waitUntil(caches.open(C).then(function(c){return c.addAll([self.registration.scope]);}));" +
    "  self.skipWaiting();});" +
    "self.addEventListener('activate',function(e){e.waitUntil(self.clients.claim());});" +
    "self.addEventListener('fetch',function(e){" +
    "  e.respondWith(caches.match(e.request,{ignoreSearch:true}).then(function(r){" +
    "    return r||fetch(e.request).then(function(n){" +
    "      var cp=n.clone();caches.open(C).then(function(c){c.put(e.request,cp);});return n;});}));});";

  if ('serviceWorker' in navigator && /^https?:$/.test(location.protocol)) {
    try {
      var url = URL.createObjectURL(new Blob([SW_SRC], { type: 'text/javascript' }));
      navigator.serviceWorker.register(url).catch(function () { /* see note above */ });
    } catch (e) { /* ignore — app is self-contained either way */ }
  }
})();
